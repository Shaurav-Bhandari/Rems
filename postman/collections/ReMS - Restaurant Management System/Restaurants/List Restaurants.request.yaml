$kind: http-request
url: "{{baseUrl}}/api/v1/restaurants/"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Response has restaurants array", () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property("restaurants");
      });
      if (pm.response.code === 200) {
          const json = pm.response.json();
          if (json.data && json.data.restaurants && json.data.restaurants.length > 0) {
              pm.collectionVariables.set("restaurantId", json.data.restaurants[0].restaurant_id);
          }
      }
    language: text/javascript
order: 1000
