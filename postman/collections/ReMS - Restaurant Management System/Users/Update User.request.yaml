$kind: http-request
url: "{{baseUrl}}/api/v1/users/{{userId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "full_name": "Admin User Updated"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: pm.test("Status is 200", () => pm.response.to.have.status(200));
    language: text/javascript
order: 3000
