$kind: http-request
url: "{{baseUrl}}/api/v1/menu/items/{{menuItemId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "Crispy Spring Rolls",
      "base_price": 9.99,
      "is_available": true
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Price updated correctly", () => {
          const json = pm.response.json();
          pm.expect(json.data.base_price).to.equal(9.99);
      });
    language: text/javascript
order: 5000
