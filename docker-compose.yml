services:
  postgres:
    image: postgres:18-alpine
    container_name: rms_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-restaurant_management_system}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/  
    ports:
      - "5432:5432"
    networks:
      - rms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-restaurant_management_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: rms_redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-roote}"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - rms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-roote}", "ping"]   # Fixed: auth + real ping
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  immudb:
    image: codenotary/immudb:latest
    container_name: rms_immudb
    environment:
      IMMUDB_ADMIN_PASSWORD: ${IMMUDB_PASSWORD:-rooter}
      IMMUDB_METRICS_ENABLED: "false"
    volumes:
      - immudb_data:/var/lib/immudb
    ports:
      - "3322:3322"
      - "9090:8080"
    networks:
      - rms_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rms_backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      immudb:
        condition: service_started
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: ${DB_NAME:-restaurant_management_system}
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-roote}
      REDIS_URL: redis://:${REDIS_PASSWORD:-roote}@redis:6379/0
      IMMUDB_HOST: immudb
      IMMUDB_PORT: 3322
      IMMUDB_PASSWORD: ${IMMUDB_PASSWORD:-rooter}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IN_PRODUCTION}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:8080/api/v1/auth/google/callback}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@rems.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ReMS}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      HIBP_ENABLED: ${HIBP_ENABLED:-true}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-shauravbhandari2@gmail.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-shaurav45}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Shaurav Bhandari}
      LOG_LEVEL: info
      GIN_MODE: release
    ports:
      - "8080:8080"
    networks:
      - rms_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  rms_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  immudb_data:
    driver: local