$kind: http-request
url: "{{baseUrl}}/api/v1/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "token": "REPLACE_WITH_RESET_TOKEN",
      "new_password": "NewPass@456",
      "confirm_password": "NewPass@456"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 400", () => {
          pm.expect([200, 400]).to.include(pm.response.code);
      });
    language: text/javascript
order: 5000
