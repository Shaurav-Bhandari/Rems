$kind: http-request
url: "{{baseUrl}}/api/v1/auth/change-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "current_password": "TestPass@123",
      "new_password": "TestPass@456",
      "confirm_password": "TestPass@456"
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200 or 400", () => {
          pm.expect([200, 400]).to.include(pm.response.code);
      });
    language: text/javascript
order: 8000
