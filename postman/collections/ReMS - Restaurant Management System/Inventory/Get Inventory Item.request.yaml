$kind: http-request
url: "{{baseUrl}}/api/v1/inventory/{{inventoryItemId}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Inventory item ID matches", () => {
          const json = pm.response.json();
          pm.expect(json.data.inventory_item_id).to.equal(pm.collectionVariables.get("inventoryItemId"));
      });
    language: text/javascript
order: 3000
