$kind: http-request
url: "{{baseUrl}}/api/v1/menu/categories"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "restaurant_id": "{{restaurantId}}",
      "name": "Appetizers",
      "description": "Starters and small plates",
      "display_order": 1
    }
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 201", () => pm.response.to.have.status(201));
      pm.test("Category has menu_category_id", () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property("menu_category_id");
      });
      if (pm.response.code === 201) {
          const json = pm.response.json();
          if (json.data && json.data.menu_category_id) {
              pm.collectionVariables.set("menuCategoryId", json.data.menu_category_id);
          }
      }
    language: text/javascript
order: 2000
