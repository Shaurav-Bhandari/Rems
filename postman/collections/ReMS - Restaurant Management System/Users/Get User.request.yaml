$kind: http-request
url: "{{baseUrl}}/api/v1/users/{{userId}}"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("User ID matches", () => {
          const json = pm.response.json();
          pm.expect(json.data.user_id).to.equal(pm.collectionVariables.get("userId"));
      });
    language: text/javascript
order: 2000
