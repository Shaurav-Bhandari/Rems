$kind: http-request
url: "{{baseUrl}}/api/v1/auth/sessions"
method: GET
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status is 200", () => pm.response.to.have.status(200));
      pm.test("Response has sessions array", () => {
          const json = pm.response.json();
          pm.expect(json.data).to.have.property("sessions");
          pm.expect(json.data.sessions).to.be.an("array");
      });
      if (pm.response.code === 200) {
          const json = pm.response.json();
          if (json.data && json.data.sessions && json.data.sessions.length > 0) {
              pm.collectionVariables.set("sessionId", json.data.sessions[0].session_id);
          }
      }
    language: text/javascript
order: 9000
